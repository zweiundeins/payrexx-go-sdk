name: CI

# Everything here is offline and deterministic. Nothing in this file talks to
# Payrexx, so neither a Payrexx outage nor an upstream documentation change can
# ever block a merge. Drift against the live API is watched separately, on a
# schedule, by upstream-watch.yml.
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor from go.mod plus the current release.
        go: ['1.23', 'stable']
    name: build & test (Go ${{ matrix.go }})
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::these files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The live tests self-skip without PAYREXX_LIVE_TEST.
      - name: go test
        run: go test -race ./...

  generated:
    runs-on: ubuntu-latest
    name: generated client matches the spec
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # The committed client must be exactly what the committed spec and the
      # pinned generator produce -- otherwise a hand-edit to a generated file
      # survives review and then vanishes at the next ./gen.sh. Uses the
      # committed openapi.json, so this stays offline.
      - name: ./gen.sh reproduces the committed output
        run: |
          ./gen.sh
          if ! git diff --exit-code; then
            echo "::error::regenerating changed tracked files -- commit the result of ./gen.sh"
            exit 1
          fi
