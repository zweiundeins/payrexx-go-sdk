            apiSignature=`echo -n "filterDatetimeUtcGreaterThan=2020-01-20+14%3A55%3A00&filterDatetimeUtcLessThan=2020-01-25+19%3A00%3A50&offset=30&limit=2" | openssl dgst -sha256 -hmac "YOUR_SECRET" -binary | openssl enc -base64`
            curl --request GET "https://api.payrexx.com/v1.0/Transaction//?instance=YOUR_INSTANCE_NAME" \
            --data-urlencode "filterDatetimeUtcGreaterThan=2020-01-20 14:55:00" \
            --data-urlencode "filterDatetimeUtcLessThan=2020-01-25 19:00:50" \
            --data-urlencode "offset=30" \
            --data-urlencode "limit=2" \
            --data-urlencode "ApiSignature=$apiSignature"
        - language: php
          code: |-
            <?php

            // $instanceName is a part of the url where you access your payrexx installation.
            // https://{$instanceName}.payrexx.com
            $instanceName = 'YOUR_INSTANCE_NAME';

            // $secret is the payrexx secret for the communication between the applications
            // if you think someone got your secret, just regenerate it in the payrexx administration
            $secret = 'YOUR_SECRET';

            $payrexx = new \Payrexx\Payrexx($instanceName, $secret);

            $transaction = new \Payrexx\Models\Request\Transaction();
            $transaction->setFilterDatetimeUtcGreaterThan(new \DateTime('2020-01-20 14:55:00'));
            $transaction->setFilterDatetimeUtcLessThan(new \DateTime('2020-01-25 19:00:50'));
            $transaction->setOffset(100);
            $transaction->setLimit(30);

            try {
                $response = $payrexx->getAll($transaction);
                var_dump($response);
            } catch (\Payrexx\PayrexxException $e) {
                print $e->getMessage();
            }
        samples-languages:
        - curl
        - php
