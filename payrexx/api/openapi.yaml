            \  successRedirectUrl: 'https://www.merchant-website.com/success',\n \
            \ failedRedirectUrl: 'https://www.merchant-website.com/failed',\n\tlanguage:\
            \ 'DE'\n}\n\n# Recursively flatten the nested hash\ndef flatten_hash(hash,\
            \ parent_key = nil, result = {})\n  hash.each do |key, value|\n    current_key\
            \ = parent_key ? \"#{parent_key}[#{key}]\" : key.to_s\n    if value.is_a?(Hash)\n\
            \      flatten_hash(value, current_key, result)\n    else\n      result[current_key]\
            \ = value\n    end\n  end\n  result\nend\n\n# # Flatten the nested hash\
            \ in params\nflattened_params = flatten_hash(params)\n\n# Convert the\
            \ flattened_params hash into a sorted query string\nquery_string = URI.encode_www_form(flattened_params)\n\
            \n# Calculate the API signature\ndigest = OpenSSL::Digest.new('sha256')\n\
            hmac = OpenSSL::HMAC.digest(digest, instance_api_secret, query_string)\n\
            api_signature = Base64.encode64(hmac).chomp\n\n# Make the POST request\n\
            url = URI.parse(\"https://api.payrexx.com/v1.0/Gateway/\")\nurl.query\
            \ = URI.encode_www_form({ instance: instance_name })\n\nhttp = Net::HTTP.new(url.host,\
